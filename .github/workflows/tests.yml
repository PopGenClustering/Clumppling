name: Tests

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Python 3.9 / NumPy 1.24
            python-version: "3.9"
            numpy-requirement: "numpy==1.24.0"

          - name: Python 3.12 / NumPy 1.26
            python-version: "3.12"
            numpy-requirement: "numpy==1.26.4"

          - name: Python 3.9 / NumPy 2.0
            python-version: "3.9"
            numpy-requirement: "numpy==2.0.0"

          - name: Python 3.12 / latest NumPy 2
            python-version: "3.12"
            numpy-requirement: "numpy>=2,<3"
          
          - name: Python 3.13 / latest NumPy 2
            python-version: "3.13"
            numpy-requirement: "numpy>=2.1,<3"

    env:
      MPLBACKEND: Agg
      PYTHONHASHSEED: "0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create NumPy constraint
        run: echo '${{ matrix.numpy-requirement }}' > constraints.txt

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            -c constraints.txt \
            -e . \
            "pytest>=8,<9"

      - name: Check dependency consistency
        run: python -m pip check

      - name: Run tests
        run: python -m pytest -q
